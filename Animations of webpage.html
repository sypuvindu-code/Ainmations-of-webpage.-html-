<!DOCTYPE html>
<html>
<head>
    <title>Animation Example</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: auto;
            animation: slideIn 3s ease-in-out;
        }

        /* Keyframes animation */
        @keyframes slideIn {
            from {
                transform: translateX(-200px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Hover transition */
        .box:hover {
            background-color: red;
            transform: scale(1.2);
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <h2>CSS Animation Example</h2>
    <div class="box"></div>

</body>

</html>


Output:

A blue square appears.
It slides from left to center (animation).
When you hover, it becomes red and increases in size.
